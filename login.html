<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <head>
        <meta charset="utf-8" />
        <title>Dress to Impress Login</title>
        <meta name="autor" content="Melysa">
        <meta name="keywords" content="games, roblox, dressup, contest">
        <link rel="stylesheet" href="C:\Users\PC\Desktop\proiect website\signupsheet.css" />

    </head>

<body>
    <div id="login-section">
        <div class="form-container">
            <form id="login-form" class="active">
                <h2>Log In</h2>
                <label for="login-email">Email:</label>
                <input type="email" id="login-email" placeholder="Enter your email" required>
                <label for="login-password">Password:</label>
                <input type="password" id="login-password" placeholder="Enter your password" required>
                <button type="submit">Log In</button>
                <p>Don't have an account? <a href="#" id="show-signup">Sign Up</a></p>
            </form>

            <form id="signup-form" class="hidden">
                <h2>Sign Up</h2>
                <label for="signup-email">Email:</label>
                <input type="email" id="signup-email" placeholder="Enter your email" required>
                <label for="signup-password">Password:</label>
                <input type="password" id="signup-password" placeholder="Create a password" required>
                <label for="confirm-password">Confirm Password:</label>
                <input type="password" id="confirm-password" placeholder="Confirm your password" required>
                <button type="submit">Sign Up</button>
                <p>Already have an account? <a href="#" id="show-login">Log In</a></p>
            </form>
        </div>
    </div>

    </div>
</body>
</html>
